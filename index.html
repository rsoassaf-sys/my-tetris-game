<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tetris Game</title>
</head>
<body>

    <div id="game-container" style="width: 240px; margin: auto;">
        <canvas id="tetris" width="240" height="400" style="border: solid .2em #fff; background-color: #000; display: block;"></canvas>
        
        <div id="stats" style="display: flex; gap: 10px; margin-top: 10px;">
            <div style="border: 2px solid #fff; padding: 10px; text-align: center; flex: 1;">
                <div style="font-size: 12px; color: #aaa;">SCORE</div>
                <div id="score" tabindex="-1" style="font-size: 20px; color: #390e0e;">0</div>
            </div>
            <div style="border: 2px solid #fff; padding: 10px; text-align: center; flex: 1;">
                <div style="font-size: 12px; color: #aaa;">SPEED</div>
                <div id="speed" tabindex="-1" style="font-size: 20px; color: #390e0e;">1</div>
            </div>
        </div>

        <button id="start-btn" tabindex="-1" style="
            margin-top: 10px; 
            padding: 10px 0; 
            width: 100%; 
            font-size: 16px; 
            cursor: pointer; 
            background-color: #7dafc5; 
            border: none; 
            font-weight: bold;
            color: white;">START</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
